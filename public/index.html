<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Study Tools</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #uv-form { display: flex; gap: 8px; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 20px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #uv-frame { display: none; width: 100%; height: 80vh; border: none; margin-top: 20px; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Search</h2>
    <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Search or enter a URL" autofocus />
        <button type="submit">Go</button>
    </form>

    <iframe id="uv-frame"></iframe>

    <!-- 1. Load the Dependencies First -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="/baremux/index.js"></script>

    <script>
        const form = document.getElementById("uv-form");
        const address = document.getElementById("uv-address");
        const frame = document.getElementById("uv-frame");
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

        // Helper: Logic to determine if it's a URL or a search
        function search(input) {
            try {
                return new URL(input).toString();
            } catch (e) {}
            if (input.includes(".") && !input.includes(" ")) return "https://" + input;
            return "https://google.com" + encodeURIComponent(input);
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault(); // This stops the page from reloading/adding the "?"

            // Register the Service Worker
            try {
                await navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            } catch (err) {
                console.error("SW failed:", err);
            }

            const url = search(address.value);

            // Set up the high-speed "Epoxy" connection
            let wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
            
            if (await connection.getTransport() !== "/epoxy/index.mjs") {
                await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
            }

            // Show the frame and load the site
            frame.style.display = "block";
            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        });
    </script>
</body>
</html>
